<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Dashboard de Implantação</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>📊 Dashboard de Implantação</h1>
<button id="btnAtualizar">🔄 Atualizar dados</button>

<section class="card">
    <h2>🧑‍💼 5 clientes mais novos</h2>
    <div id="clientesNovos"></div>
</section>

<section class="card">
    <h2>💰 5 maiores boletos</h2>
    <div id="maioresBoletos"></div>
</section>

<section class="card">
    <h2>📈 Visões Gerais</h2>
    <canvas id="graficoClientes"></canvas>
    <canvas id="graficoFaturamento"></canvas>
</section>

<section class="card">
    <h2>🚨 Clientes há mais tempo sem contato</h2>
    <div id="clientesSemContato">Carregando...</div>
  </section>
  
  <section class="card">
    <h2>🆕 10 clientes mais novos</h2>
    <div id="clientesNovos">Carregando...</div>
  </section>
  
  <section class="card">
    <h2>💰 5 maiores boletos</h2>
    <div id="maioresBoletos">Carregando...</div>
  </section>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="jsconfig.js"></script>
<script src="jscsv.js"></script>
<script src="jsdata.js"></script>
<script src="jsmetrics.js"></script>
<script src="jscharts.js"></script>
<script src="jsmain.js"></script>

</body>
</html>
